<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入数据 - 曼曼心情日记</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#ffeaa7,#fab1a0,#fd79a8);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:rgba(255,255,255,0.97);border-radius:20px;padding:30px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.15);text-align:center}
        h1{color:#c44569;margin-bottom:8px;font-size:1.4em}
        .step{background:#fff3f6;border-radius:12px;padding:15px;margin:15px 0;text-align:left;font-size:0.95em;line-height:1.8}
        .step-num{display:inline-block;background:#c44569;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:0.85em;margin-right:8px}
        .btn{display:inline-block;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;border:none;padding:14px 32px;border-radius:50px;font-size:1.1em;cursor:pointer;margin:10px 5px;box-shadow:0 10px 30px rgba(255,107,157,0.3);transition:all 0.3s}
        .btn:active{transform:scale(0.96)}
        .btn:disabled{background:#b2bec3;box-shadow:none}
        .text-area{width:100%;height:100px;padding:12px;border-radius:12px;border:2px solid #fab1a0;font-size:0.85em;resize:none;margin:10px 0}
        .text-area:focus{outline:none;border-color:#c44569}
        .result{padding:12px;border-radius:10px;margin:10px 0;display:none}
        .result.success{background:#dff9fb;color:#0a3d62}
        .result.error{background:#ffe0e0;color:#c0392b}
        .link{color:#0984e3;word-break:break-all;display:block;margin-top:15px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .spinner{display:inline-block;width:16px;height:16px;border:2px solid transparent;border-top:2px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
        .count{font-size:1.2em;color:#c44569;font-weight:bold}
    </style>
</head>
<body>
<div class="card">
    <h1>📥 第2步：导入新网站</h1>

    <div class="step">
        <p><span class="step-num">1</span> 把刚才复制的数据 <b>长按粘贴</b> 到下方</p>
        <p><span class="step-num">2</span> 点击 <b>"导入到云端"</b></p>
        <p><span class="step-num">3</span> 自动同步到服务器，双方都能看到</p>
    </div>

    <textarea class="text-area" id="pasteBox" placeholder="在这里长按，粘贴从旧站复制来的数据..."></textarea>

    <div>
        <button class="btn" id="importBtn" onclick="importData()" disabled>导入到云端</button>
    </div>

    <div class="result" id="resultBox"></div>

    <p style="margin-top:10px;font-size:0.85em;color:#636e72">还没有复制数据？用旧手机打开：<br><span class="link">https://qingshunew.github.io/mood-diary/migrate.html</span></p>

    <a href="/" class="link" style="color:#0984e3;text-decoration:none;">🔙 回到首页</a>
</div>
<script>
const textarea = document.getElementById('pasteBox');
const btn = document.getElementById('importBtn');

// 检测粘贴内容
textarea.addEventListener('input', function(){
    try{
        const data = JSON.parse(this.value.trim());
        btn.disabled = !Array.isArray(data) || data.length === 0;
        if(btn.disabled === false){
            btn.textContent = `导入到云端 (${data.length}条记录)`;
        }
    }catch(e){
        btn.disabled = true;
        btn.textContent = '导入到云端';
    }
});

// 支持自动读取剪贴板（iOS可能需要手动粘贴）
async function autoPaste(){
    try{
        if(navigator.clipboard && navigator.clipboard.readText){
            const text = await navigator.clipboard.readText();
            if(text && text.trim().startsWith('[')){
                textarea.value = text;
                textarea.dispatchEvent(new Event('input'));
            }
        }
    }catch(e){}
}
autoPaste();

async function importData(){
    const resultBox = document.getElementById('resultBox');
    resultBox.style.display = 'none';
    
    try{
        const records = JSON.parse(textarea.value.trim());
        if(!Array.isArray(records) || records.length === 0){
            resultBox.className = 'result error';
            resultBox.textContent = '数据格式不对，请重新复制';
            resultBox.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>导入中...';

        let success = 0, fail = 0;
        for(let r of records){
            try{
                const resp = await fetch('/api/records', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        date: r.date,
                        mood: r.mood,
                        emoji: r.emoji,
                        mood_label: r.mood_label || '',
                        activity: r.activity || ''
                    })
                });
                if(resp.ok) success++; else fail++;
            }catch(e){ fail++; }
        }

        resultBox.style.display = 'block';
        if(fail === 0){
            resultBox.className = 'result success';
            resultBox.innerHTML = `✅ 导入成功！<b>${success}</b> 条记录已同步到云端<br><br><a href="/" style="color:#0984e3;">👉 点击这里打开网站查看</a>`;
            textarea.value = '';
        } else {
            resultBox.className = 'result error';
            resultBox.textContent = `⚠️ 成功${success}条，失败${fail}条，请重试`;
        }
        btn.innerHTML = '导入到云端';
        btn.disabled = true;

    }catch(e){
        resultBox.className = 'result error';
        resultBox.textContent = '数据格式不正确，请重新复制粘贴';
        resultBox.style.display = 'block';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
