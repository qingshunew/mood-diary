<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="心情日记">
    <meta name="theme-color" content="#ff6b9d">
    <meta name="msapplication-TileColor" content="#ff6b9d">
    <title>曼曼心情日记 - 记录每一天的美好</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 飘落的心形动画 -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="container">
        <header class="header">
            <div class="header-decorations">
                <span class="decoration decoration-1">🌸</span>
                <span class="decoration decoration-2">💕</span>
                <span class="decoration decoration-3">🌷</span>
                <span class="decoration decoration-4">💝</span>
                <span class="decoration decoration-5">🦋</span>
            </div>
            <h1>❤️曼曼心情日记❤️</h1>
            <p class="subtitle">记录每一天的心情与小确幸</p>
            <p class="warm-quote" id="warmQuote"></p>
        </header>

        <div class="main-content">
            <!-- 每日一句 -->
            <div class="daily-quote" id="dailyQuote">
                <span class="quote-icon">💬</span>
                <p class="quote-text"></p>
            </div>

            <!-- 记录区域 -->
            <section class="record-section">
                <h2>🌈 今日记录</h2>
                <div class="date-display" id="currentDate"></div>
                
                <div class="mood-selector">
                    <h3>今天的心情是？</h3>
                    <p class="mood-hint">点击选择最符合你现在心情的表情吧~</p>
                    <div class="mood-options">
                        <button class="mood-btn" data-mood="happy" data-emoji="😊">
                            <span class="emoji">😊</span>
                            <span class="mood-label">开心</span>
                        </button>
                        <button class="mood-btn" data-mood="love" data-emoji="😍">
                            <span class="emoji">😍</span>
                            <span class="mood-label">甜蜜</span>
                        </button>
                        <button class="mood-btn" data-mood="calm" data-emoji="😌">
                            <span class="emoji">😌</span>
                            <span class="mood-label">平静</span>
                        </button>
                        <button class="mood-btn" data-mood="excited" data-emoji="🤩">
                            <span class="emoji">🤩</span>
                            <span class="mood-label">兴奋</span>
                        </button>
                        <button class="mood-btn" data-mood="sad" data-emoji="😢">
                            <span class="emoji">😢</span>
                            <span class="mood-label">难过</span>
                        </button>
                        <button class="mood-btn" data-mood="angry" data-emoji="😤">
                            <span class="emoji">😤</span>
                            <span class="mood-label">生气</span>
                        </button>
                        <button class="mood-btn" data-mood="tired" data-emoji="😴">
                            <span class="emoji">😴</span>
                            <span class="mood-label">疲惫</span>
                        </button>
                        <button class="mood-btn" data-mood="worried" data-emoji="😰">
                            <span class="emoji">😰</span>
                            <span class="mood-label">焦虑</span>
                        </button>
                    </div>
                </div>

                <div class="activity-input">
                    <h3>✨ 今天做了什么？</h3>
                    <p class="input-hint">记录下今天的小确幸或者烦恼，让心情有个出口~</p>
                    <textarea id="activityInput" placeholder="记录今天发生的事情，好事坏事都可以...&#10;&#10;比如：&#10;今天喝到了好喝的奶茶 🧋&#10;看了一部很棒的电影 🎬&#10;工作有点累，但很充实 💪"></textarea>
                </div>

                <button class="save-btn" id="saveBtn">
                    <span class="btn-text">保存今日记录</span>
                    <span class="btn-icon">💝</span>
                </button>

                <div class="encouragement" id="encouragement"></div>
            </section>

            <!-- 统计区域 -->
            <section class="stats-section">
                <h2>📊 月度统计</h2>
                <div class="month-selector">
                    <button id="prevMonth">&lt;</button>
                    <span id="currentMonth"></span>
                    <button id="nextMonth">&gt;</button>
                </div>
                
                <div class="stats-display">
                    <div class="stat-card">
                        <h3>💖 心情分布</h3>
                        <div class="mood-stats" id="moodStats"></div>
                    </div>
                    <div class="stat-card">
                        <h3>📈 统计摘要</h3>
                        <div class="summary-stats" id="summaryStats"></div>
                    </div>
                </div>

                <div class="calendar-view">
                    <h3>📅 本月心情日历</h3>
                    <p class="calendar-hint">每个emoji都是你当天的心情，点击可以查看详情哦~</p>
                    <div class="calendar" id="calendar"></div>
                </div>

                <div class="month-message" id="monthMessage"></div>
            </section>

            <!-- 温暖时刻 -->
            <section class="warm-moments-section">
                <h2>🌟 温暖时刻</h2>
                <div class="warm-moments-grid" id="warmMoments"></div>
            </section>

            <!-- 历史记录 -->
            <section class="history-section">
                <h2>📖 历史记录</h2>
                <div class="history-list" id="historyList"></div>
            </section>
        </div>

        <footer class="footer">
            <p class="footer-text">💕 每一天都值得被记录 💕</p>
            <p class="footer-subtext">愿你每天的笑容都比昨天多一点~</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
