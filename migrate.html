<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出数据 - 曼曼心情日记</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#ffeaa7,#fab1a0,#fd79a8);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:rgba(255,255,255,0.97);border-radius:20px;padding:30px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.15);text-align:center}
        h1{color:#c44569;margin-bottom:8px;font-size:1.4em}
        .step{background:#fff3f6;border-radius:12px;padding:15px;margin:15px 0;text-align:left;font-size:0.95em;line-height:1.8}
        .step-num{display:inline-block;background:#c44569;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:0.85em;margin-right:8px}
        .btn{display:inline-block;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;border:none;padding:14px 32px;border-radius:50px;font-size:1.1em;cursor:pointer;margin:10px 5px;box-shadow:0 10px 30px rgba(255,107,157,0.3);transition:all 0.3s}
        .btn:active{transform:scale(0.96)}
        .btn:disabled{background:#b2bec3;box-shadow:none}
        .text-area{width:100%;height:80px;padding:12px;border-radius:12px;border:2px solid #fab1a0;font-size:0.85em;resize:none;margin:10px 0}
        .text-area:focus{outline:none;border-color:#c44569}
        .success{background:#dff9fb;color:#0a3d62;padding:12px;border-radius:10px;margin:10px 0;display:none}
        .link{color:#0984e3;word-break:break-all}
    </style>
</head>
<body>
<div class="card">
    <h1>📤 第1步：导出旧数据</h1>

    <div class="step">
        <p><span class="step-num">1</span> 下方是她在旧站记录的数据，自动读取</p>
        <p><span class="step-num">2</span> 点击 <b>"复制数据"</b></p>
        <p><span class="step-num">3</span> 打开新网站粘贴导入</p>
    </div>

    <textarea class="text-area" id="dataBox" placeholder="正在读取旧数据..." readonly></textarea>
    
    <div>
        <button class="btn" id="copyBtn" disabled onclick="copyData()">📋 复制数据</button>
    </div>
    <div class="success" id="copySuccess">✅ 已复制！现在打开新网站粘贴导入</div>

    <div style="margin-top:15px;text-align:center">
        <a href="http://124.221.201.20/migrate.html" class="link" style="text-decoration:none;font-size:1em;color:#0984e3;" onclick="prompt('新网站导入地址','http://124.221.201.20/migrate.html');return false">
            🔗 打开新网站粘贴数据 →
        </a>
    </div>
</div>
<script>
(function(){
    const raw = localStorage.getItem('moodRecords');
    const box = document.getElementById('dataBox');
    const btn = document.getElementById('copyBtn');
    if(raw && JSON.parse(raw).length > 0){
        box.value = raw;
        btn.disabled = false;
        btn.style.background = 'linear-gradient(135deg,#00b894,#00cec9)';
        btn.style.boxShadow = '0 10px 30px rgba(0,184,148,0.3)';
    } else {
        box.value = '⚠️ 没有找到旧数据，请确认在同一个浏览器中打开';
    }
})();

function copyData(){
    const box = document.getElementById('dataBox');
    box.select();
    document.execCommand('copy');
    if(navigator.clipboard) navigator.clipboard.writeText(box.value);
    document.getElementById('copySuccess').style.display = 'block';
}
</script>
</body>
</html>
